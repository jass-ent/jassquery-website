<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="90%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#8e6e8a" stop-opacity="0.42"/>
      <stop offset="45%" stop-color="#8e6e8a" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#8e6e8a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="95%" r="55%">
      <stop offset="0%" stop-color="#8e6e8a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8e6e8a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#2a2a2a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- logo placeholder -->
  <rect x="80" y="115" width="400" height="400" fill="none" stroke="#8e6e8a" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="6 6" rx="16"/>
  <text x="280" y="310" font-family="sans-serif" font-size="15" font-weight="600" fill="#8e6e8a" fill-opacity="0.7" text-anchor="middle" letter-spacing="1.5">DROP LOGO HERE</text>
  <text x="280" y="332" font-family="sans-serif" font-size="12" fill="#8e6e8a" fill-opacity="0.5" text-anchor="middle">(queryforge-detailed)</text>

  <!-- accent mark left of eyebrow -->
  <circle cx="540" cy="157" r="5" fill="#8e6e8a"/>

  <!-- eyebrow -->
  <text x="558" y="163" font-family="Syne, 'Trebuchet MS', sans-serif" font-size="16" font-weight="600" fill="#c4aac0" letter-spacing="3.2">KEEPA&apos;S SCHEDULE BUTTON</text>

  <!-- headline -->
  <text font-family="Syne, 'Trebuchet MS', sans-serif" font-weight="800" fill="#eceae6" letter-spacing="-0.5">
    <tspan x="540" y="250" font-size="62">Queries don&apos;t run</tspan>
    <tspan x="540" y="320" font-size="62" fill="#c4aac0">themselves.</tspan>
  </text>

  <!-- subtitle -->
  <text x="540" y="400" font-family="'DM Sans', sans-serif" font-size="22" font-weight="300" fill="#eceae6" fill-opacity="0.65">QueryForge does — automatically, on your schedule.</text>
  <text x="540" y="430" font-family="'DM Sans', sans-serif" font-size="22" font-weight="300" fill="#eceae6" fill-opacity="0.65">Coming soon &#183; Join the waitlist.</text>

  <!-- divider line -->
  <rect x="80" y="555" width="48" height="2" fill="#8e6e8a" rx="1"/>

  <!-- wordmark -->
  <text x="80" y="590" font-family="Syne, 'Trebuchet MS', sans-serif" font-size="22" font-weight="800" fill="#eceae6" letter-spacing="0.5">Query<tspan fill="#a888a4">Forge</tspan></text>

  <!-- domain -->
  <text x="1120" y="590" font-family="'DM Sans', sans-serif" font-size="16" font-weight="400" fill="#eceae6" fill-opacity="0.4" text-anchor="end" letter-spacing="1">jassquery.com/queryforge</text>
</svg>
