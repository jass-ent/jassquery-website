<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="90%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#5b8fa8" stop-opacity="0.40"/>
      <stop offset="45%" stop-color="#5b8fa8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5b8fa8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="95%" r="55%">
      <stop offset="0%" stop-color="#5b8fa8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#5b8fa8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#2a2a2a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- logo placeholder -->
  <rect x="80" y="115" width="400" height="400" fill="none" stroke="#5b8fa8" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="6 6" rx="16"/>
  <text x="280" y="310" font-family="sans-serif" font-size="15" font-weight="600" fill="#5b8fa8" fill-opacity="0.7" text-anchor="middle" letter-spacing="1.5">DROP LOGO HERE</text>
  <text x="280" y="332" font-family="sans-serif" font-size="12" fill="#5b8fa8" fill-opacity="0.5" text-anchor="middle">(jassquery.detailed)</text>

  <!-- accent mark left of eyebrow -->
  <circle cx="540" cy="157" r="5" fill="#5b8fa8"/>

  <!-- eyebrow -->
  <text x="558" y="163" font-family="Syne, 'Trebuchet MS', sans-serif" font-size="16" font-weight="600" fill="#a4ccd9" letter-spacing="3.2">TOOLS FOR KEEPA POWER USERS</text>

  <!-- headline -->
  <text font-family="Syne, 'Trebuchet MS', sans-serif" font-weight="800" fill="#eceae6" letter-spacing="-0.5">
    <tspan x="540" y="245" font-size="54">Your Keepa queries</tspan>
    <tspan x="540" y="310" font-size="54" fill="#a4ccd9">deserve better tools.</tspan>
  </text>

  <!-- subtitle -->
  <text x="540" y="395" font-family="'DM Sans', sans-serif" font-size="22" font-weight="300" fill="#eceae6" fill-opacity="0.65">Built by an 8-year Amazon &amp; Keepa veteran.</text>
  <text x="540" y="425" font-family="'DM Sans', sans-serif" font-size="22" font-weight="300" fill="#eceae6" fill-opacity="0.65">Two products. One family.</text>

  <!-- divider line -->
  <rect x="80" y="555" width="48" height="2" fill="#5b8fa8" rx="1"/>

  <!-- wordmark -->
  <text x="80" y="590" font-family="Syne, 'Trebuchet MS', sans-serif" font-size="22" font-weight="800" fill="#eceae6" letter-spacing="0.5">JASS<tspan fill="#7aaec4">&#160;Query</tspan></text>

  <!-- domain -->
  <text x="1120" y="590" font-family="'DM Sans', sans-serif" font-size="16" font-weight="400" fill="#eceae6" fill-opacity="0.4" text-anchor="end" letter-spacing="1">jassquery.com</text>
</svg>
